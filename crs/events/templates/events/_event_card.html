{% load event_extras %}
<div class="card">
    <a href="{% url 'events:event_view' e.pk %}" class="card-link">
        <div class="card-header">
            <span class="client-avatar">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </span>
            <span class="client-name">{{ e.client.name }}</span>
            <span class="client-phone">{{ e.client.phone|format_phone }}</span>
        </div>
        <div class="card-body">
            <p class="relation">{{ e.get_relation_display }} по имени <strong>{{ e.person_name }}</strong></p>
            <p class="event-info">
                <span class="badge badge-type">{{ e.get_event_type_display }}</span>
                <span class="badge badge-countdown">{% days_until e.event_date %}</span>
            </p>
            <p class="event-date">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
                {{ e.event_date }}
            </p>
        </div>
    </a>
    <div class="card-actions">
        <a href="whatsapp://send?phone={{ e.client.phone }}" class="whatsapp-btn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M17.6 6.3A8.9 8.9 0 0 0 4.9 17.7L4 21l3.4-.9a8.9 8.9 0 0 0 12.8-8A8.9 8.9 0 0 0 17.6 6.3ZM12 19.5a7.4 7.4 0 0 1-3.8-1l-.3-.2-2.5.6.7-2.4-.2-.3a7.5 7.5 0 1 1 13.9-3.9A7.5 7.5 0 0 1 12 19.5Zm4.1-5.6c-.2-.1-1.3-.7-1.6-.7-.2-.1-.4-.1-.5.1l-.7.9c-.1.2-.3.2-.5.1-.7-.3-1.4-.8-2-1.4-.5-.5-1-1.2-1.4-1.9-.1-.2 0-.4.1-.5l.4-.4.2-.4v-.4c-.1-.1-.5-1.3-.7-1.7-.2-.5-.4-.4-.5-.4h-.5c-.1 0-.4.1-.6.3-.2.2-.8.8-.8 2s.8 2.3 1 2.5c.1.1 1.6 2.5 3.9 3.5.5.2 1 .4 1.3.5.6.2 1.1.1 1.5.1.5-.1 1.3-.5 1.5-1 .2-.5.2-.9.1-1Z"/></svg>
            Написать в WhatsApp
        </a>
        {% if e.client.telegram %}
        <a href="tg://resolve?domain={{ e.client.telegram|cut:"@" }}" class="telegram-btn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M21.9 4.5 18.6 20c-.2 1-.9 1.3-1.8.8l-5-3.7-2.4 2.3c-.3.3-.5.5-1 .5l.3-4.9 8.9-8c.4-.3-.1-.5-.6-.2L6.6 13 1.8 11.5c-1-.3-1-1 .2-1.5L20.6 3c.9-.3 1.6.2 1.3 1.5Z"/></svg>
            Написать в Telegram
        </a>
        {% endif %}
    </div>
</div>
